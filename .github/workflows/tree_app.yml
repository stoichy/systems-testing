name: Tree App Testing

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install pytest

    - name: Run Pytest
      # Specificăm folderul unde se află testele
      working-directory: laboratories/cicd-documentation
      run: pytest
